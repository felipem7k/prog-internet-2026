<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/contato.css">
    <title>Contato</title>
</head>

<body>
    <header>
        <h1>Contato</h1>
    </header>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="sobre.html">Sobre</a></li>
            <li><a href="contato.html">Contato</a></li>
        </ul>
    </nav>
    <main>
        <section id="contato-sec">
            <form action="#">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" required minlength="3" placeholder="Seu nome">

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required placeholder="exemplo@email.com">

                <label for="telefone">Telefone:</label>
                <input type="tel" id="telefone" name="telefone" placeholder="(XX) XXXXX-XXXX"
                    pattern="\(\d{2}\) \d{5}-\d{4}" required>

                <label for="mensagem">Mensagem:</label>
                <textarea id="mensagem" name="mensagem" rows="5" required placeholder="Escreva sua mensagem..."></textarea>

                <p id="mensagem-sucesso"></p>
                <button type="submit">Enviar</button>
                
                <button type="button" id="btn-alerta">Mostrar Alerta</button>
                <button type="button" id="btn-cor">Mudar Cor</button>
                <button type="button" id="btn-conteudo">Mudar Conteúdo</button>
            </form>
        </section>
    </main>
    <footer>
        <p>Felipe Machado &mdash; 2026</p>
    </footer>

    <script type="module" src="./assets/js/script.js"></script>
</body>

</html>
